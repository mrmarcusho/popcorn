<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Popcorn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <h1>🍿 Popcorn</h1>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="search movies..." />
      <button type="button" id="btnSearch">search</button>
    </div>
    <div id="authArea" class="auth-area"></div>
  </header>

  <main>
    <section id="loginSection" class="card auth-card">
      <h2>log in</h2>
      <p class="hint">so your stuff saves</p>
      <label>username <input type="text" id="loginUser" /></label>
      <label>password <input type="password" id="loginPass" /></label>
      <button type="button" id="btnLogin">log in</button>
      <p class="switch">new? <a href="#" id="linkShowRegister">register</a></p>
      <p id="loginMsg" class="msg"></p>
    </section>

    <section id="registerSection" class="card auth-card hidden">
      <h2>register</h2>
      <label>username <input type="text" id="regUser" /></label>
      <label>password <input type="password" id="regPass" /></label>
      <button type="button" id="btnRegister">make account</button>
      <p class="switch">have account? <a href="#" id="linkShowLogin">log in</a></p>
      <p id="regMsg" class="msg"></p>
    </section>

    <section id="appSection" class="hidden">
      <p id="searchMsg" class="msg"></p>

      <div id="searchResultsCard" class="card hidden">
        <div class="row tight">
          <h2 style="margin:0">search results</h2>
          <button type="button" class="secondary" id="btnClearSearch">clear</button>
        </div>
        <div id="searchResults" class="grid"></div>
      </div>

      <div id="detailCard" class="card hidden">
        <div id="detailBox" class="detail-box"></div>
      </div>

      <nav class="tabs">
        <button type="button" class="tab active" data-tab="discover">discover</button>
        <button type="button" class="tab" data-tab="watchlist">watchlist</button>
        <button type="button" class="tab" data-tab="reviews">reviews</button>
        <button type="button" class="tab" data-tab="recs">recommended</button>
      </nav>

      <section class="tab-panel active" data-tab="discover">
        <div class="card">
          <h2>discover</h2>
          <p class="hint">popular picks — click to see info, add to watchlist, or rate</p>
          <div id="listDiscover" class="grid"></div>
        </div>
      </section>

      <section class="tab-panel" data-tab="watchlist">
        <div class="card">
          <h2>your watchlist</h2>
          <div class="row tight">
            <label>sort
              <select id="sortWant">
                <option value="added">newest</option>
                <option value="title">a-z title</option>
              </select>
            </label>
            <button type="button" id="btnRefreshWant">reload</button>
          </div>
          <div id="listWant" class="list"></div>
        </div>
      </section>

      <section class="tab-panel" data-tab="reviews">
        <div class="card">
          <h2>your reviews</h2>
          <div class="row tight">
            <label>sort
              <select id="sortSeen">
                <option value="rating_high">stars high</option>
                <option value="rating_low">stars low</option>
                <option value="title">a-z title</option>
                <option value="added">newest edit</option>
              </select>
            </label>
            <button type="button" id="btnRefreshSeen">reload</button>
          </div>
          <div id="listSeen" class="list"></div>
        </div>
      </section>

      <section class="tab-panel" data-tab="recs">
        <div class="card">
          <h2>recommended for you</h2>
          <p class="hint">picked from your top genres</p>
          <div id="listRecs" class="list"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
